version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: drinksaver-db
    environment:
      POSTGRES_DB: drinksaver
      POSTGRES_USER: drinksaver
      POSTGRES_PASSWORD: drinksaver123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinksaver -d drinksaver"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drinksaver-network

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: drinksaver-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/drinksaver
      KC_DB_USERNAME: drinksaver
      KC_DB_PASSWORD: drinksaver123
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    command: start-dev
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - drinksaver-network

  # Backend API
  backend:
    image: kingbrady/drinksaver-backend:1.3.0-multi-architechture
    container_name: drinksaver-backend
    environment:
      ALCOHOL_REPOSITORY: postgres
      BEER_REPOSITORY: postgres
      DRINK_REPOSITORY: postgres
      RECOMMENDATION_REPOSITORY: postgres
      POSTGRES_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drinksaver
      POSTGRES_USERNAME: drinksaver
      POSTGRES_PASSWORD: drinksaver123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - drinksaver-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: drinksaver-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - drinksaver-network

volumes:
  postgres_data:

networks:
  drinksaver-network:
    driver: bridge
